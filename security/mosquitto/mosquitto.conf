# ============================================================
# Mosquitto MQTT Broker — Secured Configuration
# RFID Gate Intelligence Platform
# ============================================================

# ----------------------------------------------------------
# Listener
# ----------------------------------------------------------
# Port 1883 for authenticated connections (no TLS yet)
# On AWS we'll add port 8883 with TLS certificates
listener 1883

# ----------------------------------------------------------
# Authentication
# ----------------------------------------------------------
# DISABLE anonymous access — this is the most important line.
# Without this, anyone can connect and read/write all topics.
allow_anonymous false

# Password file — contains username:hashed_password pairs.
# Generated with: mosquitto_passwd -b /mosquitto/config/passwd <user> <pass>
password_file /mosquitto/config/passwd

# ----------------------------------------------------------
# Access Control List (ACL)
# ----------------------------------------------------------
# Controls which user can read/write which topics.
# Without this, any authenticated user can access everything.
acl_file /mosquitto/config/acl

# ----------------------------------------------------------
# Logging
# ----------------------------------------------------------
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true

# ----------------------------------------------------------
# Persistence (optional, keeps messages across restarts)
# ----------------------------------------------------------
persistence true
persistence_location /mosquitto/data/