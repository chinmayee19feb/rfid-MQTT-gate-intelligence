# ============================================================
# Docker Compose — Monitoring Stack
# RFID Gate Intelligence Platform
# ============================================================
# Starts two containers:
#   Prometheus (port 9090) — collects and stores metrics
#   Grafana    (port 3000) — visualizes metrics as dashboards
#
# Usage:
#   cd monitoring
#   docker compose up -d
#
# Then open:
#   Prometheus: http://localhost:9090
#   Grafana:    http://localhost:3000 (admin / rfid2026)
# ============================================================

version: "3.8"

services:
  # ----------------------------------------------------------
  # Prometheus — metrics collector
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: rfid-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ----------------------------------------------------------
  # Grafana — dashboard and visualization
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:latest
    container_name: rfid-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=rfid2026
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data: