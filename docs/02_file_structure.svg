<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background: white;">

<text x="340" y="28" text-anchor="middle" font-size="16" font-weight="500" fill="#2C2C2A">Your project — what each folder and file does</text>

