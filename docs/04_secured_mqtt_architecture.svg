<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background: white;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="340" y="28" text-anchor="middle" font-size="15" font-weight="500" fill="#2C2C2A">Secured RFID pipeline — before vs after</text>

<!-- BEFORE section -->
<rect x="40" y="50" width="600" height="200" rx="16" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="340" y="76" text-anchor="middle" font-size="14" font-weight="500" fill="#791F1F">Before — no security</text>

<!-- Before: Simulator -->
<rect x="70" y="96" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="130" y="122" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Simulator</text>

<line x1="190" y1="118" x2="248" y2="118" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Before: Middleware -->
<rect x="250" y="96" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="310" y="122" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Middleware</text>

<line x1="370" y1="118" x2="428" y2="118" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Before: MQTT broker unsecured -->
<rect x="430" y="96" width="180" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="520" y="114" text-anchor="middle" font-size="14" font-weight="500" fill="#791F1F">MQTT broker</text>
<text x="520" y="132" text-anchor="middle" font-size="12" fill="#A32D2D">No password needed</text>

<!-- Hacker -->
<rect x="430" y="164" width="180" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="520" y="182" text-anchor="middle" font-size="14" font-weight="500" fill="#791F1F">Anyone can connect</text>
<text x="520" y="200" text-anchor="middle" font-size="12" fill="#A32D2D">Read data, inject fakes</text>

<line x1="520" y1="140" x2="520" y2="162" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- AFTER section -->
<rect x="40" y="280" width="600" height="310" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="306" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">After — authenticated and access-controlled</text>

<!-- Secured MQTT broker -->
<rect x="220" y="326" width="240" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="350" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">MQTT broker (secured)</text>
<text x="340" y="368" text-anchor="middle" font-size="12" fill="#0F6E56">Password required + ACL rules</text>

<!-- middleware_svc -->
<rect x="60" y="420" width="170" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="145" y="444" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53">middleware_svc</text>
<text x="145" y="462" text-anchor="middle" font-size="12" fill="#185FA5">Read + write all topics</text>

<line x1="145" y1="420" x2="280" y2="382" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ai_svc -->
<rect x="255" y="420" width="170" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="444" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">ai_svc</text>
<text x="340" y="462" text-anchor="middle" font-size="12" fill="#534AB7">Read uplink, write alerts</text>

<line x1="340" y1="420" x2="340" y2="382" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- dashboard_svc -->
<rect x="450" y="420" width="170" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="535" y="444" text-anchor="middle" font-size="14" font-weight="500" fill="#412402">dashboard_svc</text>
<text x="535" y="462" text-anchor="middle" font-size="12" fill="#854F0B">Read-only access</text>

<line x1="535" y1="420" x2="400" y2="382" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Blocked hacker -->
<rect x="255" y="510" width="170" height="48" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="340" y="530" text-anchor="middle" font-size="14" font-weight="500" fill="#791F1F">No password?</text>
<text x="340" y="548" text-anchor="middle" font-size="12" fill="#A32D2D">Connection refused</text>

<text x="340" y="578" text-anchor="middle" font-size="12" fill="#888780">Anonymous connections are blocked</text>

</svg>